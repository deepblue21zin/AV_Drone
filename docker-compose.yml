services:
  sim:
    build:
      context: .
      dockerfile: docker/sim/Dockerfile
      args:
        PX4_VERSION: v1.15.4
    image: av-drone-sim:latest
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY:-}
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
      HEADLESS: "1"
      PX4_SIM_TARGET: ${PX4_SIM_TARGET:-gazebo-classic_iris_rplidar}
      PX4_SITL_WORLD: ${PX4_SITL_WORLD:-obstacle_demo}
      PX4_GZ_WORLD: ${PX4_GZ_WORLD:-}
      GAZEBO_IP: "127.0.0.1"
      GAZEBO_MASTER_URI: "http://127.0.0.1:11345"
      PX4_GAZEBO_DISPLAY: ${DISPLAY:-}
    volumes:
      - .:/workspace/AV_Drone
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - sim-home:/root
    working_dir: /opt/PX4-Autopilot
    init: true
    stdin_open: true
    tty: true
    command: ["/workspace/AV_Drone/docker/sim/entrypoint.sh"]

  ros:
    build:
      context: .
      dockerfile: docker/ros/Dockerfile
    image: av-drone-ros:latest
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY:-}
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
    volumes:
      - .:/workspace/AV_Drone
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspace/AV_Drone
    init: true
    stdin_open: true
    tty: true
    depends_on:
      - sim
    command: ["sleep", "infinity"]

volumes:
  sim-home:

notes:
  - Single-drone Gazebo Classic obstacle demo scenario.
  - Two corridor walls keep the vehicle inside the lane so it cannot simply escape to the far left or right.
  - Thick poles are placed near alternating walls to force pass-through avoidance between obstacles.
  - The goal is farther away so the run lasts longer and produces a more convincing avoidance trace.
  - The planner is local reactive avoidance, not a global map planner, so the corridor is shaped to be solvable with local sensing.

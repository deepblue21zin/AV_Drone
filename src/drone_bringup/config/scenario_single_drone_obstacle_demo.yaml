notes:
  - Single-drone Gazebo Classic obstacle demo scenario.
  - Two corridor walls keep the vehicle inside the lane so it cannot simply escape to the far left or right.
  - Small side poles form simple left/right guide rows, similar to a slalom lane reference image.
  - Larger interior poles are staggered left and right but kept smaller and farther apart so the drone sees wider, cleaner gaps.
  - The goal is farther away so the run lasts longer and produces a more convincing avoidance trace.
  - The planner is a LiDAR gap-based local planner, so the map is intentionally simple and corridor-like rather than maze-dense.

services:
  sim:
    build:
      context: .
      dockerfile: docker/sim/Dockerfile
      args:
        PX4_VERSION: v1.15.4
    image: av-drone-sim:latest
    network_mode: host
    ipc: host
    environment:
      HEADLESS: ${HEADLESS:-1}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}
      GALLIUM_DRIVER: ${GALLIUM_DRIVER:-llvmpipe}
      MESA_LOADER_DRIVER_OVERRIDE: ${MESA_LOADER_DRIVER_OVERRIDE:-swrast}
      QT_OPENGL: ${QT_OPENGL:-software}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/tmp/runtime-root}
      GZ_RENDER_ENGINE: ${GZ_RENDER_ENGINE:-ogre2}
      PX4_GZ_SIM_RENDER_ENGINE: ${PX4_GZ_SIM_RENDER_ENGINE:-ogre2}
      GZ_PARTITION: ${GZ_PARTITION:-av_drone}
      IGN_PARTITION: ${IGN_PARTITION:-av_drone}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      FASTDDS_BUILTIN_TRANSPORTS: ${FASTDDS_BUILTIN_TRANSPORTS:-UDPv4}
      PX4_SIM_TARGET: ${PX4_SIM_TARGET:-gz_x500}
      PX4_GZ_WORLD: ${PX4_GZ_WORLD:-obstacle_demo}
      PX4_GZ_MODEL_NAME: ${PX4_GZ_MODEL_NAME:-drone1}
    volumes:
      - .:/workspace/AV_Drone
      - .:/home/deepblue/AV_Drone
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/shm:/dev/shm
      - sim-home:/root
    working_dir: /opt/PX4-Autopilot
    init: true
    stdin_open: true
    tty: true
    command: ["/opt/PX4-Autopilot/docker/sim/entrypoint.sh"]

  ros:
    build:
      context: .
      dockerfile: docker/ros/Dockerfile
    image: av-drone-ros:latest
    network_mode: host
    ipc: host
    environment:
      QT_X11_NO_MITSHM: "1"
      GZ_PARTITION: ${GZ_PARTITION:-av_drone}
      IGN_PARTITION: ${IGN_PARTITION:-av_drone}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      FASTDDS_BUILTIN_TRANSPORTS: ${FASTDDS_BUILTIN_TRANSPORTS:-UDPv4}
    volumes:
      - .:/workspace/AV_Drone
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/shm:/dev/shm
    working_dir: /workspace/AV_Drone
    init: true
    stdin_open: true
    tty: true
    depends_on:
      - sim
    command: ["sleep", "infinity"]

volumes:
  sim-home:
